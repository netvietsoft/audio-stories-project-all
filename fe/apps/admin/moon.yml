type: 'application'
language: 'typescript'

dependsOn:
  - 'shared'
  - 'ui'
  - 'apiClient'

tasks:
  dev:
    command: 'next'
    args:
      - 'dev'
      - '-p'
      - '9003'
      - '-H'
      - '0.0.0.0'
    platform: 'node'
    options:
      mergeArgs: 'replace'
    local: true
  start:
    command: 'next'
    args:
      - 'start'
      - '-p'
      - '9003'
    platform: 'node'
    options:
      mergeArgs: 'replace'
    local: true
  build:
    command: 'next'
    args:
      - 'build'
    platform: 'node'
    options:
      mergeArgs: 'replace'
    deps:
      - '^:build'
  typecheck:
    command: 'tsc'
    args:
      - '--noEmit'
    platform: 'node'
    options:
      mergeArgs: 'replace'
  lint:
    command: 'eslint'
    args:
      - '.'
    platform: 'node'
    options:
      mergeArgs: 'replace'
