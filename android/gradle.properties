org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djavax.net.ssl.trustStore=D:/SetupC/Tools/tmp/cacerts-custom -Djavax.net.ssl.trustStorePassword=changeit
# Avast antivirus quét SSL/TLS → cert dl.google.com/maven do "Avast Web/Mail Shield Root" cấp,
# JBR không tin. Trust store trên = bản sao cacerts của JBR + đã nạp CA gốc Avast → Gradle tải được.
# (Nếu tắt Avast SSL scanning hoặc lên máy không bị chèn cert thì có thể bỏ 2 -D này.)
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Tắt Kotlin incremental: pub cache ở ổ C: còn project ổ D: (khác ổ) gây bug
# "Daemon compilation failed" khi build plugin Kotlin (audioplayers). Tắt ⇒ build ổn.
kotlin.incremental=false
